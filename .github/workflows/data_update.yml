name: Tägliches Finanz-Update

on:
  schedule:
    # Täglich um 08:00 UTC (10:00 MESZ)
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-financial-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Datenordner erstellen
        run: mkdir -p data

      - name: Python Skript ausführen
        run: python fetch_data.py

      - name: Geänderte Dateien committen
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/financial_data.json
          STORED=$(python -c "import json; d=json.load(open('data/financial_data.json')); print(d['metadata']['total_stored'])")
          TOTAL=$(python -c "import json; d=json.load(open('data/financial_data.json')); print(d['metadata']['sp500_total'])")
          git commit -m "S&P 500 Finanzdaten Update (${STORED}/${TOTAL} Ticker)" || echo "Keine Änderungen zu committen"
          git push

